name: lifeos_flutter
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^1.2.0
  path_provider: ^2.1.5
  google_fonts: ^8.0.2
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true

dependency_overrides:
  analyzer: '>=5.0.0 <7.0.0'
  build_resolvers: '>=2.0.0 <3.0.0'
  dart_style: '>=2.3.2 <3.0.0'
