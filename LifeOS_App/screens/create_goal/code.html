<style>
        .glass-panel {
            background: rgba(37, 37, 45, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .neural-input:focus {
            outline: none;
            border-color: #00E5FF;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-surface font-body selection:bg-primary/30">
<!-- Top Navigation (Shell Invisible for Task-Focused Screens) -->
<header class="fixed top-0 w-full z-50 bg-slate-950/40 backdrop-blur-xl border-b border-white/10 shadow-[0_0_15px_rgba(124,92,255,0.1)] flex justify-between items-center px-6 py-4">
<div class="flex items-center gap-3">
<button class="text-slate-400 active:scale-95 duration-200">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline font-black tracking-tighter text-2xl uppercase text-[#7C5CFF]">LifeOS</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-slate-400">sensors</span>
<div class="w-8 h-8 rounded-full bg-surface-container-high border border-white/10 overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Cyberpunk stylized profile avatar with purple neon lighting accents on a dark background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBL_eSi2duQPSsm4ELlP-YDp4wbX_aa0cNOyZ-jaeKxD3JFLhieh6tApwoZlRd6ZdJS4xScNABa9eOYqPoylTXV9YLGscexLrhhSwnzQOUJ_evCeEAOHtoA9T0kHkB2N6_nYrHZrr76e9e6XBx-R6eD17aFnNoqHwYJDAtnqtyMtiRFvfQEy-99cELbfzmrqOGJfRVPA6CFKUtxKK85Q3cg4QYx4wiXgUuaytZNzXBfN2p9fJDvjAWTSxzG1eGQ0tG-UI_gvntWDTI"/>
</div>
</div>
</header>
<main class="min-h-screen pt-28 pb-12 px-6 max-w-2xl mx-auto flex flex-col justify-center">
<!-- Header Section -->
<div class="mb-12">
<div class="flex items-center gap-2 mb-2">
<div class="h-[1px] w-8 bg-secondary"></div>
<span class="font-label text-[10px] tracking-[0.3em] uppercase text-secondary">Initiating Uplink</span>
</div>
<h2 class="font-headline font-black text-5xl md:text-6xl tracking-tight text-on-surface leading-none uppercase">
                NEW PROTOCOL
            </h2>
</div>
<!-- Input Form -->
<div class="space-y-10">
<!-- Protocol Name -->
<div class="relative group">
<label class="absolute -top-3 left-4 px-2 bg-background font-label text-[10px] tracking-[0.2em] uppercase text-slate-400 z-10 transition-colors group-focus-within:text-secondary">
                    Protocol Name
                </label>
<input class="w-full glass-panel px-6 py-5 rounded-xl font-label text-lg tracking-wider text-on-surface neural-input uppercase placeholder:text-slate-600 transition-all" placeholder="E.G. COGNITIVE_PEAK_01" type="text"/>
</div>
<!-- Performance Target -->
<div class="relative group">
<label class="absolute -top-3 left-4 px-2 bg-background font-label text-[10px] tracking-[0.2em] uppercase text-slate-400 z-10 transition-colors group-focus-within:text-secondary">
                    Performance Target
                </label>
<div class="relative">
<input class="w-full glass-panel px-6 py-5 rounded-xl font-label text-lg tracking-wider text-on-surface neural-input uppercase placeholder:text-slate-600 transition-all" placeholder="DEFINE METRIC PARAMETER" type="text"/>
<span class="material-symbols-outlined absolute right-6 top-1/2 -translate-y-1/2 text-slate-500">
                        monitoring
                    </span>
</div>
</div>
<!-- Grid for date/deadline -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<div class="relative group">
<label class="absolute -top-3 left-4 px-2 bg-background font-label text-[10px] tracking-[0.2em] uppercase text-slate-400 z-10 transition-colors group-focus-within:text-secondary">
                        Completion Deadline
                    </label>
<div class="relative">
<input class="w-full glass-panel px-6 py-5 rounded-xl font-label text-lg tracking-wider text-on-surface neural-input transition-all appearance-none" type="date"/>
<span class="material-symbols-outlined absolute right-6 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none">
                            calendar_today
                        </span>
</div>
</div>
<div class="relative group">
<label class="absolute -top-3 left-4 px-2 bg-background font-label text-[10px] tracking-[0.2em] uppercase text-slate-400 z-10 transition-colors group-focus-within:text-secondary">
                        Priority Level
                    </label>
<div class="relative">
<select class="w-full glass-panel px-6 py-5 rounded-xl font-label text-lg tracking-wider text-on-surface neural-input transition-all appearance-none bg-transparent">
<option class="bg-surface">ULTRA_CRITICAL</option>
<option class="bg-surface">HIGH_YIELD</option>
<option class="bg-surface">MAINTENANCE</option>
</select>
<span class="material-symbols-outlined absolute right-6 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none">
                            expand_more
                        </span>
</div>
</div>
</div>
<!-- Background Aesthetic Element -->
<div class="pt-8 opacity-20 pointer-events-none select-none overflow-hidden">
<div class="flex gap-4">
<div class="h-1 flex-1 bg-gradient-to-r from-primary/50 to-transparent"></div>
<div class="h-1 flex-1 bg-gradient-to-l from-secondary/50 to-transparent"></div>
</div>
</div>
</div>
<!-- Action Section -->
<footer class="mt-16 flex flex-col items-center">
<button class="group relative w-full py-6 rounded-full overflow-hidden transition-all duration-300 active:scale-95 shadow-[0_0_30px_rgba(124,92,255,0.3)]">
<!-- Background Gradient -->
<div class="absolute inset-0 bg-gradient-to-r from-[#7C5CFF] via-[#df215c] to-[#FF3D71] group-hover:opacity-90 transition-opacity"></div>
<div class="relative flex items-center justify-center gap-3">
<span class="font-label text-sm tracking-[0.5em] font-bold text-white uppercase">
                        EXECUTE
                    </span>
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">
                        bolt
                    </span>
</div>
</button>
<p class="mt-8 font-label text-[10px] text-slate-500 tracking-[0.2em] uppercase text-center">
                System identity: LifeOS // Core Kernel 4.8.2
            </p>
</footer>
</main>
<!-- Visual Artifacts -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 overflow-hidden">
<div class="absolute top-[10%] right-[-10%] w-[500px] h-[500px] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[5%] left-[-10%] w-[400px] h-[400px] bg-secondary/10 rounded-full blur-[100px]"></div>
<div class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(#ffffff03_1px,transparent_1px)] [background-size:40px_40px]"></div>
