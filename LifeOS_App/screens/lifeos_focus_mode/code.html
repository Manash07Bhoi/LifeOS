<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&amp;family=Manrope:wght@300;400;600&amp;family=Space+Grotesk:wght@300;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface-variant": "#acaab1",
                    "background": "#0e0e13",
                    "surface": "#0e0e13",
                    "on-primary": "#2f0095",
                    "on-error": "#490013",
                    "surface-container-high": "#1f1f26",
                    "surface-variant": "#25252d",
                    "on-secondary": "#004d57",
                    "on-tertiary-fixed": "#390010",
                    "tertiary-container": "#ee2e65",
                    "inverse-on-surface": "#55545b",
                    "surface-container-highest": "#25252d",
                    "on-secondary-fixed-variant": "#005964",
                    "error-dim": "#d73357",
                    "secondary-container": "#006875",
                    "surface-tint": "#b1a1ff",
                    "secondary-dim": "#00d4ec",
                    "on-primary-fixed": "#000000",
                    "on-secondary-fixed": "#003a42",
                    "primary-fixed-dim": "#9780ff",
                    "surface-dim": "#0e0e13",
                    "on-tertiary": "#480016",
                    "on-surface": "#f9f5fd",
                    "tertiary-fixed-dim": "#ff7891",
                    "secondary": "#00e3fd",
                    "surface-container": "#19191f",
                    "primary-container": "#a491ff",
                    "on-tertiary-container": "#000000",
                    "on-primary-container": "#230075",
                    "tertiary-fixed": "#ff90a2",
                    "inverse-primary": "#613de3",
                    "primary-dim": "#7757fa",
                    "inverse-surface": "#fcf8ff",
                    "surface-container-low": "#131319",
                    "error": "#ff6e84",
                    "error-container": "#a70138",
                    "on-background": "#f9f5fd",
                    "outline": "#76747b",
                    "outline-variant": "#48474d",
                    "secondary-fixed": "#26e6ff",
                    "on-primary-fixed-variant": "#2d008e",
                    "on-secondary-container": "#e8fbff",
                    "secondary-fixed-dim": "#00d7f0",
                    "primary-fixed": "#a491ff",
                    "on-error-container": "#ffb2b9",
                    "surface-bright": "#2c2b33"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "xxl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Manrope"],
                    "label": ["Space Grotesk"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glow-cyan {
            filter: drop-shadow(0 0 12px rgba(0, 227, 253, 0.4));
        }
        .timer-ring {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-secondary/30">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#0e0e13]/80 backdrop-blur-xl border-b border-white/10 flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full border border-secondary/50 flex items-center justify-center bg-surface-container overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Digital holographic user avatar with cyan glowing lines and HUD interface elements on a dark tech background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA4pY0BHWtzJkcXCdlN3TKrdaLU-WFu6ohs8RmIswmurRX_LIn0JAVU-psfNTIOZzRDb_ZXQ3vJk3ReAvlc51vjHptorwSe43dCA0lQGB5yqe3cC2__Nls2OQ3fqlgQN9fEqIJJX-ang9ONEJWVHgESEVttugZLZtuYChlKbECwrKZG3asi4FuA0CvXBtIWpjO901hJUIQ_I28-ac0rvDEitL3R65Z7eW--PHkZ7jp9r6e3UuSyCmiEnCG1Z0ofPljmBSJnzpnvask"/>
</div>
<span class="font-headline font-black tracking-tighter uppercase text-2xl text-[#7C5CFF] tracking-widest drop-shadow-[0_0_8px_rgba(124,92,255,0.8)]">LIFE_OS_v1.0</span>
</div>
<div class="flex items-center gap-6">
<div class="hidden md:flex items-center gap-6 font-label text-slate-500 text-sm tracking-widest">
<span class="hover:text-[#ff6d8a] transition-colors duration-300 cursor-pointer">DASHBOARD</span>
<span class="hover:text-[#ff6d8a] transition-colors duration-300 cursor-pointer">NEURAL_NET</span>
<span class="text-[#00e3fd] cursor-default">FOCUS_MODE</span>
<span class="hover:text-[#ff6d8a] transition-colors duration-300 cursor-pointer">ARCHIVE</span>
</div>
<span class="material-symbols-outlined text-[#7C5CFF] cursor-pointer hover:scale-110 transition-transform">terminal</span>
</div>
</header>
<main class="min-h-screen pt-32 pb-40 flex flex-col items-center justify-center px-6 relative overflow-hidden">
<!-- Ambient Background Pulse -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-secondary/5 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Ambient Mode Toggle -->
<div class="mb-16 z-10">
<button class="flex items-center gap-3 px-5 py-2 rounded-full bg-surface-container-high border border-outline-variant/30 hover:border-secondary/50 transition-all group">
<span class="material-symbols-outlined text-secondary text-sm group-hover:animate-pulse">settings_brightness</span>
<span class="font-label text-xs uppercase tracking-widest text-on-surface-variant group-hover:text-secondary">Ambient Mode: Off</span>
</button>
</div>
<!-- Main Focus Timer Section -->
<div class="relative w-full max-w-xl flex flex-col items-center z-10">
<!-- Circular Timer -->
<div class="relative w-72 h-72 md:w-96 md:h-96 flex items-center justify-center mb-12">
<!-- Background Ring -->
<svg class="absolute w-full h-full">
<circle class="stroke-surface-container-highest" cx="50%" cy="50%" fill="transparent" r="48%" stroke-width="4"></circle>
</svg>
<!-- Active Progress Ring -->
<svg class="absolute w-full h-full timer-ring">
<circle class="stroke-secondary glow-cyan" cx="50%" cy="50%" fill="transparent" r="48%" stroke-dasharray="1200" stroke-dashoffset="300" stroke-linecap="round" stroke-width="4"></circle>
</svg>
<!-- Time Display -->
<div class="flex flex-col items-center">
<span class="font-headline text-7xl md:text-8xl font-extrabold tracking-tight text-on-surface">25:00</span>
<span class="font-label text-sm uppercase tracking-[0.3em] text-secondary/70 mt-2">DEEP_WORK</span>
</div>
</div>
<!-- Preset Chips -->
<div class="flex flex-wrap justify-center gap-4 mb-12">
<button class="px-6 py-2 rounded-md bg-secondary/10 border border-secondary/30 text-secondary font-label text-xs tracking-widest hover:bg-secondary/20 transition-all">25 MIN</button>
<button class="px-6 py-2 rounded-md bg-surface-container-high border border-outline-variant/20 text-on-surface-variant font-label text-xs tracking-widest hover:text-on-surface transition-all">45 MIN</button>
<button class="px-6 py-2 rounded-md bg-surface-container-high border border-outline-variant/20 text-on-surface-variant font-label text-xs tracking-widest hover:text-on-surface transition-all">60 MIN</button>
</div>
<!-- Glassmorphic Controls Bar -->
<div class="w-full max-w-md bg-white/5 backdrop-blur-2xl border border-white/10 rounded-xxl p-6 shadow-2xl flex items-center justify-around">
<button class="w-12 h-12 flex items-center justify-center rounded-xl bg-surface-container-highest text-on-surface-variant hover:text-error transition-colors group">
<span class="material-symbols-outlined group-active:scale-90 transition-transform">restart_alt</span>
</button>
<button class="w-20 h-20 flex items-center justify-center rounded-full bg-gradient-to-br from-primary to-primary-dim text-on-primary-container shadow-[0_0_30px_rgba(124,92,255,0.4)] hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined text-4xl" data-weight="fill">play_arrow</span>
</button>
<button class="w-12 h-12 flex items-center justify-center rounded-xl bg-surface-container-highest text-on-surface-variant hover:text-secondary transition-colors group">
<span class="material-symbols-outlined group-active:scale-90 transition-transform">pause</span>
</button>
</div>
</div>
<!-- Secondary Info (Intentional Asymmetry) -->
<div class="absolute bottom-32 left-12 hidden lg:block opacity-40">
<div class="font-label text-[10px] uppercase tracking-[0.5em] text-on-surface-variant rotate-90 origin-left">
                SYSTEM_STABILITY: 98.4% // LATENCY: 2ms
            </div>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] z-50 bg-[#19191f]/40 backdrop-blur-2xl rounded-2xl border border-white/5 shadow-[0_8px_32px_0_rgba(0,0,0,0.8)] flex justify-around items-center px-4 py-3">
<div class="flex items-center justify-center text-slate-400 p-3 hover:bg-white/5 transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
</div>
<div class="flex items-center justify-center text-slate-400 p-3 hover:bg-white/5 transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="insights">insights</span>
</div>
<div class="flex items-center justify-center text-slate-400 p-3 hover:bg-white/5 transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="emergency_home">emergency_home</span>
</div>
<div class="flex items-center justify-center bg-gradient-to-br from-[#7C5CFF] to-[#7757fa] text-white rounded-xl p-3 shadow-[0_0_15px_rgba(124,92,255,0.5)] active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="bolt">bolt</span>
</div>
<div class="flex items-center justify-center text-slate-400 p-3 hover:bg-white/5 transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="settings_input_component">settings_input_component</span>
</div>
</nav>
</body></html>
