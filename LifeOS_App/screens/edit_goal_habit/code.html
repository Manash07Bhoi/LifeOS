<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(37, 37, 45, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .neural-glow-primary {
            box-shadow: 0 0 20px rgba(124, 92, 255, 0.4);

        .neural-glow-error {
            box-shadow: 0 0 15px rgba(255, 61, 113, 0.15);

<body class="font-body selection:bg-primary/30">
<!-- Top Navigation Shell -->
<header class="fixed top-0 w-full z-50 bg-slate-950/40 backdrop-blur-xl border-b border-white/5 flex justify-between items-center px-6 h-16 shadow-[0_0_15px_rgba(124,92,255,0.1)]">
<div class="flex items-center gap-3 active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined text-violet-500">terminal</span>
<h1 class="font-headline font-black tracking-tighter uppercase text-xl text-violet-500 drop-shadow-[0_0_8px_rgba(124,92,255,0.8)]">NEURAL_OS</h1>
</div>
<div class="flex items-center gap-6">
<span class="material-symbols-outlined text-slate-400 hover:text-violet-400 cursor-pointer transition-all">search</span>
<div class="w-8 h-8 rounded-full overflow-hidden border border-violet-500/30">
<img alt="User Profile" data-alt="close-up portrait of a digital artist with neon lighting reflecting on their face, high-tech aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBugP5dVfLHtv6axHqCNMw_n7dx2GADeq06sxFRlHz4pPpB_Nf-sW2lDJdt5gijA_g5pGEnuxC8f54Cjqkv8J-ZwFyodV5_75kLekPeJmDqtpcuhzeSmuLdd9GBZjstor-IvyphtvmAPIas9P0EvlaMpFwPAKzFdsZLpZJYnp1bsgAs_9BEJXPEeQRJqzR_hZsaUpXYAhcalQXlr3EROhFvFNEhMUcHBMKaS7otRmA-8WJJbVnc4bxdOcxv0CPpqlt2NXjr98aWrSI"/>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-24 pb-12 px-6 max-w-2xl mx-auto min-h-screen">
<!-- Screen Header -->
<div class="mb-10 flex items-center justify-between">
<div>
<span class="font-label text-[10px] uppercase tracking-[0.3em] text-cyan-400 mb-2 block">Configuration Mode</span>
<h2 class="font-headline font-black text-4xl tracking-tighter text-on-background">Edit Protocol</h2>
</div>
<div class="w-12 h-12 glass-panel rounded-xl flex items-center justify-center text-violet-500 active:scale-95 transition-transform">
<span class="material-symbols-outlined">close</span>
</div>
</div>
<form class="space-y-8">
<!-- Basic Identity Section -->
<section class="space-y-4">
<div class="space-y-2">
<label class="font-label text-[10px] uppercase tracking-[0.3em] text-slate-400 ml-1">Protocol Identifier</label>
<div class="glass-panel p-4 rounded-xl group focus-within:border-violet-500/50 transition-all">
<input class="bg-transparent border-none w-full p-0 text-xl font-headline font-bold text-on-background focus:ring-0 placeholder:text-slate-600" type="text" value="Neural Interface Development"/>
</div>
</div>
<div class="space-y-2">
<label class="font-label text-[10px] uppercase tracking-[0.3em] text-slate-400 ml-1">Mission Objective</label>
<div class="glass-panel p-4 rounded-xl focus-within:border-violet-500/50 transition-all">
<textarea class="bg-transparent border-none w-full p-0 text-on-surface-variant focus:ring-0 min-h-[100px] resize-none" placeholder="Define the core purpose of this protocol...">Enhancing cognitive load capacity through systematic mental modelling and bi-daily focus sessions. Integration of hardware-level optimization into daily workflows.</textarea>
</div>
</div>
</section>
<!-- Frequency & Metrics Grid -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-2">
<label class="font-label text-[10px] uppercase tracking-[0.3em] text-slate-400 ml-1">Execution Cycle</label>
<div class="glass-panel p-2 rounded-xl flex gap-1">
<button class="flex-1 py-3 px-2 rounded-lg font-label text-[10px] tracking-widest uppercase transition-all bg-violet-500 text-on-primary-fixed font-bold" type="button">Daily</button>
<button class="flex-1 py-3 px-2 rounded-lg font-label text-[10px] tracking-widest uppercase transition-all text-slate-500 hover:text-slate-300" type="button">Weekly</button>
<button class="flex-1 py-3 px-2 rounded-lg font-label text-[10px] tracking-widest uppercase transition-all text-slate-500 hover:text-slate-300" type="button">Custom</button>
</div>
</div>
<div class="space-y-2">
<label class="font-label text-[10px] uppercase tracking-[0.3em] text-slate-400 ml-1">Priority Matrix</label>
<div class="glass-panel p-4 rounded-xl flex items-center justify-between">
<span class="font-body font-semibold text-cyan-400">Level 05</span>
<div class="flex gap-1">
<div class="w-1.5 h-4 bg-cyan-400/10 rounded-full"></div>
<div class="w-1.5 h-4 bg-cyan-400/30 rounded-full"></div>
<div class="w-1.5 h-4 bg-cyan-400/60 rounded-full"></div>
<div class="w-1.5 h-4 bg-cyan-400 rounded-full"></div>
<div class="w-1.5 h-4 bg-cyan-400 rounded-full"></div>
</div>
</div>
</div>
</section>
<!-- Metadata Section -->
<section class="space-y-4">
<div class="glass-panel p-6 rounded-xl relative overflow-hidden group">
<!-- Subtle background pulse -->
<div class="absolute inset-0 bg-gradient-to-br from-violet-500/5 to-transparent pointer-events-none"></div>
<div class="relative z-10 flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-slate-900 border border-white/5 flex items-center justify-center">
<span class="material-symbols-outlined text-violet-400" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<div>
<h4 class="font-headline font-bold text-lg">Neural Spark</h4>
<p class="text-xs text-slate-400">Trigger protocol on system wakeup</p>
</div>
</div>
<div class="w-12 h-6 bg-slate-800 rounded-full p-1 cursor-pointer transition-all border border-white/5 relative">
<div class="w-4 h-4 bg-violet-500 rounded-full absolute right-1"></div>
</div>
</div>
</div>
</section>
<!-- Action Cluster -->
<div class="space-y-6 pt-6">
<button class="w-full py-5 rounded-full bg-primary-dim text-on-primary-fixed font-headline font-black uppercase tracking-widest neural-glow-primary active:scale-95 transition-all" type="submit">
                    Save Changes
                </button>
<div class="flex items-center gap-4 py-4 opacity-40 hover:opacity-100 transition-opacity justify-center group cursor-pointer">
<span class="material-symbols-outlined text-tertiary text-lg group-hover:drop-shadow-[0_0_8px_#FF3D71]">gavel</span>
<button class="text-tertiary font-label text-xs uppercase tracking-[0.4em] font-bold" type="button">Terminate Protocol</button>
</div>
</div>
</form>
</main>
<!-- Bottom Command Deck Shell (Hidden on Focus Views usually, but showing as requested for LifeOS context) -->
<nav class="fixed bottom-0 left-0 w-full h-20 bg-slate-950/60 backdrop-blur-2xl border-t border-white/10 flex justify-around items-center px-4 pb-safe z-50 shadow-[0_-10px_30px_rgba(124,92,255,0.15)] rounded-t-[1.5rem]">
<div class="flex flex-col items-center justify-center text-slate-500 opacity-60 hover:opacity-100 transition-opacity active:scale-90 duration-300">
<span class="material-symbols-outlined">grid_view</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500 opacity-60 hover:opacity-100 transition-opacity active:scale-90 duration-300">
<span class="material-symbols-outlined">analytics</span>
</div>
<div class="flex flex-col items-center justify-center text-cyan-400 drop-shadow-[0_0_10px_#00E5FF] scale-110 active:scale-90 transition-transform duration-300">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500 opacity-60 hover:opacity-100 transition-opacity active:scale-90 duration-300">
<span class="material-symbols-outlined">layers</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500 opacity-60 hover:opacity-100 transition-opacity active:scale-90 duration-300">
<span class="material-symbols-outlined">settings</span>
</div>
</nav>
