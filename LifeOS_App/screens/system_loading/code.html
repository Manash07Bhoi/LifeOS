<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LifeOS | Neural Sync</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;family=Manrope:wght@500;600&amp;family=Space_Grotesk:wght@300;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-on-surface": "#55545b",
                    "surface-variant": "#25252d",
                    "primary-container": "#a491ff",
                    "on-tertiary-fixed-variant": "#77002a",
                    "on-secondary-fixed-variant": "#005964",
                    "tertiary-container": "#ee2e65",
                    "secondary": "#00e3fd",
                    "surface-container-highest": "#25252d",
                    "on-tertiary-container": "#000000",
                    "on-secondary-container": "#e8fbff",
                    "on-primary-fixed": "#000000",
                    "tertiary-dim": "#df215c",
                    "tertiary-fixed-dim": "#ff7891",
                    "secondary-fixed": "#26e6ff",
                    "on-primary-fixed-variant": "#2d008e",
                    "inverse-surface": "#fcf8ff",
                    "surface-container-high": "#1f1f26",
                    "on-secondary": "#004d57",
                    "tertiary": "#ff6d8a",
                    "on-primary": "#2f0095",
                    "surface-tint": "#b1a1ff",
                    "outline-variant": "#48474d",
                    "secondary-dim": "#00d4ec",
                    "on-error-container": "#ffb2b9",
                    "surface-container-low": "#131319",
                    "surface-container-lowest": "#000000",
                    "surface-dim": "#0e0e13",
                    "on-secondary-fixed": "#003a42",
                    "tertiary-fixed": "#ff90a2",
                    "on-tertiary": "#480016",
                    "secondary-container": "#006875",
                    "inverse-primary": "#613de3",
                    "surface": "#0e0e13",
                    "primary-fixed": "#a491ff",
                    "primary": "#b1a1ff",
                    "on-surface-variant": "#acaab1",
                    "on-tertiary-fixed": "#390010",
                    "error": "#ff6e84",
                    "surface-bright": "#2c2b33",
                    "error-container": "#a70138",
                    "outline": "#76747b",
                    "on-error": "#490013",
                    "background": "#0e0e13",
                    "on-background": "#f9f5fd",
                    "on-primary-container": "#230075",
                    "surface-container": "#19191f",
                    "secondary-fixed-dim": "#00d7f0",
                    "error-dim": "#d73357",
                    "primary-fixed-dim": "#9780ff",
                    "primary-dim": "#7757fa",
                    "on-surface": "#f9f5fd"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": [
                            "Plus Jakarta Sans"
                    ],
                    "body": [
                            "Manrope"
                    ],
                    "label": [
                            "Space Grotesk"
                    ]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes orbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes orbit-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        .animate-orbit { animation: orbit 8s linear infinite; }
        .animate-orbit-fast { animation: orbit 4s linear infinite; }
        .animate-orbit-reverse { animation: orbit-reverse 12s linear infinite; }
        .animate-pulse-glow { animation: pulse-glow 3s ease-in-out infinite; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body overflow-hidden">
<!-- Top Navigation Suppression: Not rendered for loading/transactional states -->
<!-- Main Content Canvas -->
<main class="relative h-screen w-full flex flex-col items-center justify-center bg-surface-container-lowest">
<!-- Atmospheric Background Texture -->
<div class="absolute inset-0 z-0 opacity-20" data-alt="deep space atmospheric void with subtle cyan light streaks and microscopic digital particles drifting in dark obsidian background">
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-secondary/10 via-transparent to-transparent"></div>
</div>
<!-- Central HUD Animation -->
<div class="relative z-10 flex flex-col items-center">
<!-- Rotating Rings Container -->
<div class="relative w-64 h-64 md:w-80 md:h-80 flex items-center justify-center">
<!-- Outer Rotating Ring (Dashed) -->
<div class="absolute inset-0 border-2 border-dashed border-secondary/20 rounded-full animate-orbit-reverse"></div>
<!-- Middle Rotating Ring (Segmented) -->
<div class="absolute inset-4 border-t-2 border-r-2 border-secondary/40 rounded-full animate-orbit"></div>
<!-- Inner Glow Ring -->
<div class="absolute inset-8 border border-primary/30 rounded-full animate-pulse-glow shadow-[0_0_20px_rgba(0,229,255,0.1)]"></div>
<!-- Core Status Center -->
<div class="flex flex-col items-center justify-center text-center">
<span class="font-label text-[10px] tracking-[0.3em] text-secondary mb-2">INITIALIZING</span>
<div class="font-headline font-black text-5xl md:text-6xl tracking-tighter text-on-surface">
                        68<span class="text-secondary text-3xl">%</span>
</div>
</div>
<!-- Floating Data Points (Small Orbitals) -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 -mt-2">
<div class="w-2 h-2 rounded-full bg-secondary shadow-[0_0_10px_#00E5FF]"></div>
</div>
</div>
<!-- Loading Narrative -->
<div class="mt-12 text-center space-y-3">
<p class="font-headline font-extrabold text-2xl tracking-tight text-on-surface">
                    Syncing Neural Pathways...
                </p>
<div class="flex items-center justify-center gap-4">
<span class="font-label text-[10px] tracking-[0.4em] text-on-surface-variant uppercase">Biometric Handshake</span>
<div class="h-[1px] w-8 bg-white/10"></div>
<span class="material-symbols-outlined text-secondary text-sm" style="font-variation-settings: 'FILL' 1;">sensors</span>
</div>
</div>
<!-- Technical Metadata (Asymmetric Layout) -->
<div class="mt-16 grid grid-cols-2 gap-12 border-t border-white/5 pt-8 w-64">
<div class="flex flex-col gap-1">
<span class="font-label text-[8px] text-on-surface-variant tracking-widest uppercase">Encryption</span>
<span class="font-label text-[10px] text-secondary">AES-512-NEURAL</span>
</div>
<div class="flex flex-col gap-1 text-right">
<span class="font-label text-[8px] text-on-surface-variant tracking-widest uppercase">Uplink</span>
<span class="font-label text-[10px] text-secondary">STABLE</span>
</div>
</div>
</div>
<!-- Minimal Branding Footer -->
<div class="absolute bottom-12 left-12 flex items-center gap-3">
<div class="w-8 h-8 rounded-full border border-primary/30 flex items-center justify-center bg-primary/5">
<span class="material-symbols-outlined text-primary text-xs" style="font-variation-settings: 'FILL' 1;">terminal</span>
</div>
<div>
<h1 class="font-headline font-black tracking-tighter text-xl uppercase text-on-surface italic leading-none">LifeOS</h1>
<p class="font-label text-[8px] tracking-[0.2em] text-on-surface-variant">V.2.0.4-COGNITIVE</p>
</div>
</div>
</main>
<!-- Shell Suppression: BottomNavBar excluded as per the "Destination" Rule for focused task screens -->
</body></html>
