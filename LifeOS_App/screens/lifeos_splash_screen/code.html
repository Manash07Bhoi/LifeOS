</div>

<h1 class="font-headline font-black text-6xl tracking-tighter uppercase text-on-surface leading-none neon-glow-primary">

<div class="h-[1px] w-8 bg-gradient-to-l from-transparent to-outline-variant/50"></div>
</div>
</div>
</div>
